<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — GamingBurst Panel</title>
  <meta name="description" content="Sign in to manage your Minecraft servers.">
  <link rel="stylesheet" href="/public/css/style.css?v=111">
  <script src="/public/js/theme.js?v=101"></script>
</head>
<body>
<div class="login-bg">
  <div class="login-card fade-in">
    <div class="login-logo">
      <div class="icon-wrap">🎮</div>
      <h1>GamingBurst Panel</h1>
      <p>Minecraft Server Management</p>
    </div>

    <div id="alert" class="alert alert-error hidden">
      <span>⚠</span><span id="alertMsg"></span>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="pw-wrap">
          <span class="input-icon">👤</span>
          <input id="username" name="username" type="text"
            class="form-input has-icon" placeholder="admin"
            autocomplete="username" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="pw-wrap">
          <span class="input-icon">🔒</span>
          <input id="password" name="password" type="password"
            class="form-input has-icon" placeholder="••••••••"
            autocomplete="current-password" required>
          <button type="button" class="eye-btn" onclick="togglePw('password',this)" title="Show/hide password">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      <div style="margin-bottom:20px;">
        <label style="display:inline-flex;align-items:center;gap:8px;color:var(--text-secondary);font-size:13px;cursor:pointer;">
          <input type="checkbox" id="rememberMe" name="rememberMe" checked style="accent-color:var(--accent);">
          Remember me on this device
        </label>
      </div>
      <button id="loginBtn" type="submit" class="btn btn-primary login-btn">Sign In</button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--text-muted);">
      GamingBurst Panel v1.0 &mdash; <span id="yr"></span>
    </p>
  </div>
</div>

<!-- Update Panel Modal -->
<div id="updatePanelModal" class="sidebar-overlay" style="display:none;z-index:9999;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);">
  <div class="card" style="width:90%;max-width:400px;border:1px solid rgba(255,255,255,0.1);position:relative;">
    <button class="sidebar-close" style="position:absolute;top:16px;right:16px" onclick="closeUpdatePanelModal()" id="updatePanelCloseBtn">✕</button>
    <div class="card-header" style="border-bottom:none;padding-bottom:0;"><div class="card-title">Update Panel</div></div>
    
    <div style="margin-top:16px;font-size:14px;line-height:1.5;">
      <span style="font-size:24px;display:block;margin-bottom:8px;">⚠️</span>
      <span id="updatePanelMessage">It will update the panel. Running servers will be safely stopped and need to be started again once updated. Are you sure you want to proceed?</span>
    </div>
    
    <div style="margin-top:24px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.1);display:flex;gap:10px;">
      <button class="btn btn-secondary" style="flex:1;" onclick="closeUpdatePanelModal()" id="updatePanelCancelBtn">Cancel</button>
      <button class="btn btn-primary" style="flex:1;background:var(--accent);" onclick="confirmUpdatePanel()" id="updatePanelConfirmBtn">Confirm Update</button>
    </div>
  </div>
</div>

<script>
function showUpdatePanelModal() { document.getElementById('updatePanelModal').style.display = 'flex'; }
function closeUpdatePanelModal() { document.getElementById('updatePanelModal').style.display = 'none'; }

async function confirmUpdatePanel() {
  const btn = document.getElementById('updatePanelConfirmBtn');
  const cancelBtn = document.getElementById('updatePanelCancelBtn');
  const closeBtn = document.getElementById('updatePanelCloseBtn');
  const msg = document.getElementById('updatePanelMessage');
  
  btn.disabled = true; 
  cancelBtn.disabled = true; 
  closeBtn.style.display = 'none';
  
  msg.innerHTML = 'Initiating update...<br><br><span style="color:var(--text-muted)">Please wait while servers are safely stopped and panel restarts. Do not close this page.</span>';
  btn.innerText = 'Updating...';
  
  try {
    const res = await fetch('/api/system/update', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to update');
    
    // Start polling ping
    msg.innerHTML = 'Servers are stopping safely. Panel is updating...<br><br><span style="color:var(--text-muted)">Waiting for panel to come back online...</span>';
    
    const poll = setInterval(async () => {
      try {
        const ping = await fetch('/api/ping');
        if (ping.ok) {
          clearInterval(poll);
          msg.innerHTML = 'Update complete! Reloading...';
          setTimeout(() => location.reload(true), 1000);
        }
      } catch (e) {} // ignore connection refused during restart
    }, 3000);
    
  } catch (err) {
    msg.innerText = 'Error: ' + err.message;
    btn.innerText = 'Error';
    cancelBtn.disabled = false;
    closeBtn.style.display = 'block';
  }
}

fetch('/api/me').then(r=>r.json()).then(u=>{
  if (u.isAdmin) {
    const btn = document.getElementById('navUpdatePanel');
    if (btn) btn.style.display = 'flex';
  }
}).catch(()=>{});
</script>
<script>
  document.getElementById('yr').textContent = new Date().getFullYear();

  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    btn.innerHTML = isText
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  }

  const form = document.getElementById('loginForm');
  const btn  = document.getElementById('loginBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('alert').classList.add('hidden');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    try {
      const res  = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
          rememberMe: document.getElementById('rememberMe').checked
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        document.getElementById('alertMsg').textContent = data.error;
        document.getElementById('alert').classList.remove('hidden');
        return;
      }
      window.location.href = data.redirect;
    } catch {
      document.getElementById('alertMsg').textContent = 'Network error.';
      document.getElementById('alert').classList.remove('hidden');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  });
</script>
<script src="/public/js/nav.js?v=10"></script></body>
</html>
